services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vibetwitch
      POSTGRES_PASSWORD: vibetwitch
      POSTGRES_DB: vibetwitch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935"   # RTMP ingest
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
      - "9997:9997"   # API
    volumes:
      - ./deploy/mediamtx.yml:/mediamtx.yml
    depends_on:
      - postgres

volumes:
  pgdata:
